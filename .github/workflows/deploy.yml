# =============================================================================
# Kingdom Quest 2D — GitHub Actions CI/CD Pipeline
# Triggers: push to main → deploy dev; push to release/* → deploy prod.
# =============================================================================

name: Kingdom Quest 2D — Build & Deploy

on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, staging, prod]

env:
  AWS_REGION:     us-east-1
  NODE_VERSION:   "20"
  PYTHON_VERSION: "3.12"

# Prevent concurrent deployments to the same environment
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:

  # ── 1. Lint & Test API ──────────────────────────────────────────────────────
  test-api:
    name: Test Node.js API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aws/docker

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: aws/docker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true   # Non-fatal until lint rules are set up

      - name: Run tests
        run: npm test -- --passWithNoTests
        env:
          NODE_ENV: test

  # ── 2. Lint & Test Lambda Functions ─────────────────────────────────────────
  test-lambda:
    name: Test Lambda Functions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install lambda deps
        run: |
          pip install pytest boto3 redis psycopg2-binary moto

      - name: Run lambda tests
        run: |
          find aws/lambda_src -name "test_*.py" -exec pytest {} \; || true

  # ── 3. Validate Terraform ───────────────────────────────────────────────────
  validate-terraform:
    name: Validate Terraform
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive aws/terraform/

      - name: Terraform Validate
        working-directory: aws/terraform
        run: |
          # Use local backend for validation (no real state needed)
          cat > backend_override.tf << 'EOF'
          terraform { backend "local" {} }
          EOF
          terraform init -backend=false
          terraform validate
          rm -f backend_override.tf

  # ── 4. Build Docker Image ────────────────────────────────────────────────────
  build-docker:
    name: Build API Docker Image
    runs-on: ubuntu-latest
    needs: [test-api, validate-terraform]
    if: github.event_name != 'pull_request'

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      short-sha: ${{ steps.vars.outputs.sha_short }}

    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract ECR repository URL
        id: ecr
        run: |
          # Get ECR URL from parameter store (set this during first deploy)
          ECR_URL=$(aws ssm get-parameter \
            --name "/kq2d/ecr/api-url" \
            --query "Parameter.Value" \
            --output text 2>/dev/null || echo "")
          echo "url=$ECR_URL" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        if: steps.ecr.outputs.url != ''
        uses: docker/build-push-action@v5
        with:
          context:    aws/docker
          file:       aws/docker/Dockerfile.api
          push:       true
          tags: |
            ${{ steps.ecr.outputs.url }}:${{ steps.vars.outputs.sha_short }}
            ${{ steps.ecr.outputs.url }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── 5. Deploy Dev ────────────────────────────────────────────────────────────
  deploy-dev:
    name: Deploy → Dev
    runs-on: ubuntu-latest
    needs: [build-docker, test-lambda]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: dev
      url: https://dev.kingdomquest2d.com

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Apply (dev)
        working-directory: aws/terraform
        run: |
          terraform init
          terraform apply \
            -var-file="environments/dev/dev.tfvars" \
            -var="db_password=${{ secrets.DB_PASSWORD_DEV }}" \
            -auto-approve
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD_DEV }}

      - name: Update ECS service with new image
        run: |
          SHORT_SHA="${{ needs.build-docker.outputs.short-sha }}"
          ECR_URL=$(aws ssm get-parameter \
            --name "/kq2d/ecr/api-url" \
            --query "Parameter.Value" --output text 2>/dev/null || echo "")

          if [[ -n "$ECR_URL" && -n "$SHORT_SHA" ]]; then
            # Register new task definition with updated image
            TASK_DEF=$(aws ecs describe-task-definition \
              --task-definition "kq2d-dev-api" \
              --query "taskDefinition" --output json)
            NEW_TASK=$(echo "$TASK_DEF" | \
              jq --arg IMG "${ECR_URL}:${SHORT_SHA}" \
              '.containerDefinitions[0].image = $IMG |
               del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)')
            NEW_ARN=$(aws ecs register-task-definition \
              --cli-input-json "$NEW_TASK" \
              --query "taskDefinition.taskDefinitionArn" --output text)
            aws ecs update-service \
              --cluster kq2d-dev-cluster \
              --service kq2d-dev-api-service \
              --task-definition "$NEW_ARN"
          fi

      - name: Upload web assets to S3
        run: |
          ASSETS_BUCKET=$(aws ssm get-parameter \
            --name "/kq2d/dev/assets-bucket" \
            --query "Parameter.Value" --output text 2>/dev/null || echo "")
          if [[ -d "godot_project/assets" && -n "$ASSETS_BUCKET" ]]; then
            aws s3 sync godot_project/assets/art/ "s3://${ASSETS_BUCKET}/art/" \
              --cache-control "public, max-age=31536000, immutable" \
              --exclude "*.import" --delete
            aws s3 sync godot_project/assets/audio/ "s3://${ASSETS_BUCKET}/audio/" \
              --cache-control "public, max-age=604800" \
              --exclude "*.import"
          fi

      - name: Deployment Summary
        run: |
          echo "## ✅ Dev Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | dev |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | ${{ needs.build-docker.outputs.short-sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Timestamp | $(date -u) |" >> $GITHUB_STEP_SUMMARY

  # ── 6. Deploy Prod ───────────────────────────────────────────────────────────
  deploy-prod:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: [build-docker, test-lambda, deploy-dev]
    if: startsWith(github.ref, 'refs/heads/release/') && github.event_name == 'push'
    environment:
      name: prod
      url: https://kingdomquest2d.com

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (prod account)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Plan (prod)
        working-directory: aws/terraform
        run: |
          terraform init
          terraform plan \
            -var-file="environments/prod/prod.tfvars" \
            -var="db_password=${{ secrets.DB_PASSWORD_PROD }}" \
            -out=tfplan
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD_PROD }}

      - name: Terraform Apply (prod)
        working-directory: aws/terraform
        run: terraform apply tfplan

      - name: Update ECS prod service
        run: |
          SHORT_SHA="${{ needs.build-docker.outputs.short-sha }}"
          ECR_URL=$(aws ssm get-parameter \
            --name "/kq2d/ecr/api-url" \
            --query "Parameter.Value" --output text)
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "kq2d-prod-api" \
            --query "taskDefinition" --output json)
          NEW_TASK=$(echo "$TASK_DEF" | \
            jq --arg IMG "${ECR_URL}:${SHORT_SHA}" \
            '.containerDefinitions[0].image = $IMG |
             del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)')
          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK" \
            --query "taskDefinition.taskDefinitionArn" --output text)
          aws ecs update-service \
            --cluster kq2d-prod-cluster \
            --service kq2d-prod-api-service \
            --task-definition "$NEW_ARN"
          # Wait for stability in prod
          aws ecs wait services-stable \
            --cluster kq2d-prod-cluster \
            --services kq2d-prod-api-service

      - name: Invalidate CloudFront (prod)
        run: |
          DIST_ID=$(aws ssm get-parameter \
            --name "/kq2d/prod/cloudfront-dist-id" \
            --query "Parameter.Value" --output text 2>/dev/null || echo "")
          if [[ -n "$DIST_ID" ]]; then
            aws cloudfront create-invalidation \
              --distribution-id "$DIST_ID" \
              --paths "/*"
          fi

      - name: Deployment Summary
        run: |
          echo "## 🚀 Production Deployment Complete!" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | production |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | ${{ needs.build-docker.outputs.short-sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Ref | ${{ github.ref }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Timestamp | $(date -u) |" >> $GITHUB_STEP_SUMMARY

# ── Required GitHub Secrets ──────────────────────────────────────────────────
# Settings → Secrets and variables → Actions:
#   AWS_ACCESS_KEY_ID          — Dev/staging IAM user
#   AWS_SECRET_ACCESS_KEY      — Dev/staging IAM user
#   AWS_ACCESS_KEY_ID_PROD     — Prod IAM user (separate account recommended)
#   AWS_SECRET_ACCESS_KEY_PROD — Prod IAM user
#   DB_PASSWORD_DEV            — Dev RDS password
#   DB_PASSWORD_PROD           — Prod RDS password
#
# Required SSM Parameters (set after first terraform apply):
#   /kq2d/ecr/api-url              → ECR repository URL
#   /kq2d/dev/assets-bucket        → S3 assets bucket name (dev)
#   /kq2d/prod/cloudfront-dist-id  → CloudFront distribution ID (prod)
